<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Memory Lane - Vintage Photos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        }

        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        /* Main container */
        .container {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
        }

        /* Mysterious Image Card */
        .mystery-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .image-container {
            position: relative;
            width: 100%;
            border-radius: 25px;
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .faded-image {
            width: 100%;
            height: auto;
            display: block;
            opacity: 0.3;
            filter: blur(2px);
            transition: all 0.3s;
            pointer-events: none; /* So clicks go through to container */
        }

        .click-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.3);
            color: white;
            text-align: center;
            pointer-events: none;
        }

        .click-overlay h2 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            letter-spacing: 2px;
        }

        .click-overlay p {
            font-size: 16px;
            opacity: 0.9;
            text-shadow: 0 1px 5px rgba(0,0,0,0.5);
        }

        .finger-icon {
            font-size: 48px;
            margin-bottom: 15px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Volume indicator (mobile only) */
        .volume-requirement {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255,255,255,0.03);
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .volume-bar {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .volume-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00ff87, #60efff);
            border-radius: 4px;
            transition: width 0.2s;
        }

        .volume-text {
            color: rgba(255,255,255,0.6);
            font-size: 14px;
            text-align: center;
        }

        .volume-text span {
            color: #00ff87;
            font-weight: 600;
        }

        /* Hidden fullscreen image */
        .fullscreen-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: black;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.5s;
        }

        .fullscreen-image.show {
            display: flex;
            opacity: 1;
        }

        .fullscreen-image img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            font-size: 40px;
            cursor: pointer;
            width: 50px;
            height: 50px;
            background: rgba(0,0,0,0.5);
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            font-weight: 300;
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* Audio element */
        #prankAudio {
            display: none;
        }

        /* Mobile warning */
        .mobile-warning {
            color: rgba(255,255,255,0.3);
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
        }

        /* Volume check status */
        .volume-status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
            color: rgba(255,255,255,0.5);
            font-size: 14px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 5px;
            background: #ff4444;
            transition: background 0.3s;
        }

        .status-dot.ready {
            background: #00ff87;
        }

        /* Instructions */
        .instructions {
            margin-top: 30px;
            padding: 15px;
            background: rgba(255,255,255,0.02);
            border-radius: 10px;
            color: rgba(255,255,255,0.3);
            font-size: 12px;
            text-align: center;
        }

        /* Loading spinner */
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #00ff87;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Hidden Audio - Replace with your audio file -->
    <audio id="prankAudio" loop preload="auto" playsinline>
        <!-- Using a spooky sound as example - replace with your own -->
        <source src="000.mp3" type="audio/mpeg">
        <source src="https://www.soundjay.com/misc/sounds/funny-buzzer-1.mp3" type="audio/mpeg">
    </audio>

    <!-- Fullscreen Image Reveal -->
    <div class="fullscreen-image" id="fullscreenImage">
        <span class="close-btn" id="closeBtn">&times;</span>
        <!-- Replace with your actual image -->
        <img src="1234.png" alt="Revealed Image" id="revealedImg">
    </div>

    <div class="container">
        <!-- Mystery Card -->
        <div class="mystery-card">
            <div class="image-container" id="clickableImage">
                <!-- Faded image - replace with your image -->
                <img src="123.png" 
                     alt="Mystery Image" 
                     class="faded-image"
                     id="fadedImg">
                
                <!-- Click overlay text -->
                <div class="click-overlay">
                    <div class="finger-icon">👇</div>
                    <h2>CLICK TO OPEN</h2>
                    <p>a secret memory awaits...</p>
                </div>
            </div>

            <!-- Volume Requirement Indicator -->
            <div class="volume-requirement">
                <div class="volume-bar">
                    <div class="volume-fill" id="volumeFill"></div>
                </div>
                <div class="volume-text">
                    <span id="volumePercent">0%</span> volume required
                </div>
                
                <!-- Volume Status -->
                <div class="volume-status">
                    <div class="status-dot" id="statusDot"></div>
                    <span id="statusText">Volume too low</span>
                </div>
            </div>

            <!-- Loading Spinner -->
            <div class="spinner" id="spinner"></div>

            <!-- Mobile Instructions -->
            <div class="instructions">
                <div>📱 FOR BEST EXPERIENCE:</div>
                <div>1. Turn volume to MAX</div>
                <div>2. Click the faded image</div>
                <div>3. Watch what happens...</div>
            </div>

            <div class="mobile-warning">
                * Mobile optimized • Full volume required
            </div>
        </div>
    </div>

    <script>
        // Get elements
        const audio = document.getElementById('prankAudio');
        const clickableImage = document.getElementById('clickableImage');
        const fullscreenImage = document.getElementById('fullscreenImage');
        const closeBtn = document.getElementById('closeBtn');
        const volumeFill = document.getElementById('volumeFill');
        const volumePercent = document.getElementById('volumePercent');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const spinner = document.getElementById('spinner');
        const fadedImg = document.getElementById('fadedImg');
        const revealedImg = document.getElementById('revealedImg');

        // State variables
        let audioStarted = false;
        let currentVolume = 0;
        let isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        let volumeCheckInterval;

        // Set initial image (faded)
        // You can replace these URLs with your own images
        const fadedImageUrl = '123.png';
        const revealImageUrl = 'c.png';
        
        fadedImg.src = fadedImageUrl;
        revealedImg.src = revealImageUrl;

        // Function to check volume on mobile
        function checkMobileVolume() {
            if (isMobile) {
                // Create a test audio context to estimate volume
                try {
                    window.AudioContext = window.AudioContext || window.webkitAudioContext;
                    if (window.AudioContext) {
                        const audioContext = new AudioContext();
                        const gainNode = audioContext.createGain();
                        
                        // This doesn't give exact volume but helps detect if audio is enabled
                        if (audioContext.state === 'running') {
                            // Audio is enabled, assume high volume
                            updateVolumeUI(100);
                        } else {
                            // Audio might be muted or low
                            updateVolumeUI(30);
                        }
                    }
                } catch (e) {
                    console.log('Could not check volume:', e);
                }
            }
        }

        // Update volume UI
        function updateVolumeUI(percent) {
            currentVolume = percent;
            volumeFill.style.width = percent + '%';
            volumePercent.textContent = percent;
            
            if (percent >= 80) {
                statusDot.className = 'status-dot ready';
                statusText.textContent = '✓ Volume ready!';
                statusText.style.color = '#00ff87';
            } else {
                statusDot.className = 'status-dot';
                statusText.textContent = '⚠ Turn volume up';
                statusText.style.color = 'rgba(255,255,255,0.5)';
            }
        }

        // Simulate volume detection (in real app, this would use native APIs)
        // For demo, we'll increase volume when user clicks anywhere
        function simulateVolumeIncrease() {
            if (currentVolume < 100) {
                let newVolume = Math.min(currentVolume + 20, 100);
                updateVolumeUI(newVolume);
                
                if (newVolume === 100) {
                    statusText.textContent = '✓ Perfect! Ready to reveal';
                }
            }
        }

        // Start audio function
        function startAudio() {
            if (!audioStarted) {
                audio.volume = 1.0;
                audio.play()
                    .then(() => {
                        audioStarted = true;
                        console.log('Audio started - full volume');
                        
                        // Simulate volume increase on mobile when audio plays
                        if (isMobile) {
                            updateVolumeUI(100);
                        }
                    })
                    .catch(error => {
                        console.log('Audio play failed:', error);
                        // On mobile, this might be due to low volume
                        if (isMobile) {
                            updateVolumeUI(30);
                        }
                    });
            }
        }

        // Show fullscreen image (only if volume is high enough)
        function showFullscreenImage() {
            if (currentVolume >= 80 || !isMobile) { // Desktop always works
                spinner.style.display = 'block';
                
                setTimeout(() => {
                    spinner.style.display = 'none';
                    fullscreenImage.classList.add('show');
                    
                    // Ensure audio is playing
                    startAudio();
                    
                    // Try to go fullscreen on mobile
                    if (isMobile && document.documentElement.requestFullscreen) {
                        document.documentElement.requestFullscreen();
                    }
                }, 500);
            } else {
                // Show warning
                alert('⚠️ Please turn up your device volume to max first!');
                
                // Vibrate on mobile if supported
                if (isMobile && navigator.vibrate) {
                    navigator.vibrate(200);
                }
            }
        }

        // Event Listeners

        // Click on image
        clickableImage.addEventListener('click', function(e) {
            e.preventDefault();
            
            // Simulate volume increase on each click
            simulateVolumeIncrease();
            
            // Show the fullscreen image if volume is ready
            showFullscreenImage();
            
            // Start audio
            startAudio();
            
            // Add haptic feedback on mobile
            if (isMobile && navigator.vibrate) {
                navigator.vibrate(50);
            }
        });

        // Close fullscreen
        closeBtn.addEventListener('click', function() {
            fullscreenImage.classList.remove('show');
            
            // Exit fullscreen if active
            if (document.exitFullscreen) {
                document.exitFullscreen();
            }
        });

        // Click anywhere on fullscreen to close (optional)
        fullscreenImage.addEventListener('click', function(e) {
            if (e.target === fullscreenImage) {
                closeBtn.click();
            }
        });

        // Global click handler for audio
        document.addEventListener('click', function() {
            startAudio();
            simulateVolumeIncrease();
        });

        // Touch events for mobile
        document.addEventListener('touchstart', function() {
            startAudio();
            simulateVolumeIncrease();
        }, { passive: true });

        // Volume detection for mobile
        if (isMobile) {
            // Check volume periodically
            volumeCheckInterval = setInterval(() => {
                // This is a simulation - in reality, you'd need a native app to detect exact volume
                // But for prank purposes, we'll assume volume increases with interaction
                if (audioStarted) {
                    updateVolumeUI(100);
                }
            }, 1000);

            // Detect if ringer mode changes (iOS)
            document.addEventListener('volumechange', function() {
                updateVolumeUI(100);
            });
        } else {
            // Desktop - always show full volume
            updateVolumeUI(100);
        }

        // Secret way to reset (for you) - press Ctrl+Shift+R
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.shiftKey && e.key === 'R') {
                audio.pause();
                audio.currentTime = 0;
                audioStarted = false;
                updateVolumeUI(0);
                fullscreenImage.classList.remove('show');
                console.log('Reset prank');
            }
        });

        // Handle fullscreen change
        document.addEventListener('fullscreenchange', function() {
            if (!document.fullscreenElement) {
                // Optional: do something when exiting fullscreen
            }
        });

        // Preload images
        function preloadImages() {
            const img1 = new Image();
            img1.src = fadedImageUrl;
            const img2 = new Image();
            img2.src = revealImageUrl;
        }
        preloadImages();

        // Handle page visibility
        document.addEventListener('visibilitychange', function() {
            if (document.hidden) {
                // Optional: pause when tab hidden
            }
        });

        // Clean up
        window.addEventListener('beforeunload', function() {
            if (volumeCheckInterval) {
                clearInterval(volumeCheckInterval);
            }
        });
    </script>
</body>
</html>
